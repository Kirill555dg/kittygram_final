name: Kittygram CI/CD

on:
  push:
    branches:
      - main

jobs:
  tests:
    name: Линтер и тесты
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Ruff (backend)
        run: ruff check backend

      - name: Prepare tests.yml for CI
        run: |
          cat << EOF > tests.yml
          repo_owner: ${{ github.repository_owner }}
          kittygram_domain: https://example.com
          taski_domain: https://example.com
          dockerhub_username: ${{ secrets.DOCKER_USERNAME }}
          EOF

      - name: Pytest
        run: >
          pytest
          --ignore=tests/test_connection.py
          --ignore=tests/test_dockerhub_images.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend tests
        working-directory: frontend
        run: |
          npm ci
          CI=true npm test -- --watchAll=false --passWithNoTests

  build-and-push:
    name: Сборка и публикация образов
    runs-on: ubuntu-latest
    needs: tests
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/kittygram_backend:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/kittygram_frontend:latest

      - name: Build and push gateway
        uses: docker/build-push-action@v6
        with:
          context: ./nginx
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/kittygram_gateway:latest

      - name: Telegram notify
        if: success()
        env:
          TG_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "${TG_BOT_TOKEN:-}" ] || [ -z "${TG_CHAT_ID:-}" ]; then
            echo "Пропуск уведомления Telegram: задайте TELEGRAM_BOT_TOKEN и TELEGRAM_CHAT_ID в секретах репозитория."
            exit 0
          fi
          curl -fsS -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT_ID}" \
            --data-urlencode text="Kittygram CI/CD: тесты прошли, образы kittygram_backend / kittygram_frontend / kittygram_gateway опубликованы на Docker Hub."
